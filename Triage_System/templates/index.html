<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triage Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f6ff;
        }

        #chat-container {
            width: 400px;
            height: 600px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
        }

        #chat-header {
            background: #0d6efd;
            color: white;
            padding: 15px;
            border-radius: 10px 10px 0 0;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }

        .user-wrapper {
            align-self: flex-end;
            align-items: flex-end;
        }

        .bot-wrapper {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.4;
        }

        .user-message {
            background: #0d6efd;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            background: #e9f2ff;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .ticket {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            color: #856404;
        }

        .timestamp {
            font-size: 10px;
            color: #666;
            margin-top: 3px;
        }

        #input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #eee;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }

        #send-btn {
            padding: 10px 20px;
            background: #0d6efd;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        #send-btn:disabled {
            background: #9bbcf5;
            cursor: not-allowed;
        }

        .typing-dots span {
            display: inline-block;
            width: 6px;
            height: 6px;
            margin: 0 2px;
            background: #666;
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0.2; }
            40% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="chat-header">Support Chat</div>
        <div id="chat-box">
            <div class="message-wrapper bot-wrapper">
                <div class="message bot-message">
                    Hi! I am your support assistant. How can I help you today?
                </div>
                <div class="timestamp"></div>
            </div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type your message here..." />
            <button id="send-btn">Send</button>
        </div>
    </div>

<script>
const chatBox = document.getElementById("chat-box");
const userInput = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");

function getTime() {
    const now = new Date();
    let h = now.getHours();
    let m = now.getMinutes().toString().padStart(2, '0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${h}:${m} ${ampm}`;
}

function addMessage(text, sender, extraClass="") {
    const wrapper = document.createElement("div");
    wrapper.className = `message-wrapper ${sender === "user" ? "user-wrapper" : "bot-wrapper"}`;

    const msg = document.createElement("div");
    msg.className = `message ${sender === "user" ? "user-message" : "bot-message"} ${extraClass}`;
    msg.innerHTML = text;

    const time = document.createElement("div");
    time.className = "timestamp";
    time.textContent = getTime();

    wrapper.appendChild(msg);
    wrapper.appendChild(time);

    chatBox.appendChild(wrapper);
    chatBox.scrollTop = chatBox.scrollHeight;

    return wrapper;
}

function showTyping() {
    const wrapper = document.createElement("div");
    wrapper.className = "message-wrapper bot-wrapper";
    wrapper.id = "typing";

    const msg = document.createElement("div");
    msg.className = "message bot-message";
    msg.innerHTML = `Bot is typing <span class="typing-dots"><span></span><span></span><span></span></span>`;

    wrapper.appendChild(msg);
    chatBox.appendChild(wrapper);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
}

async function sendMessage() {
    const message = userInput.value.trim();
    if (!message) return;

    addMessage(message, "user");
    userInput.value = "";

    userInput.disabled = true;
    sendBtn.disabled = true;

    showTyping();

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: message, user_id: 1 })
        });

        const data = await response.json();

        removeTyping();

        addMessage(data.reply, "bot");

        if (data.resolved === false && data.ticket_id) {
            addMessage(
                `Your issue has been escalated. Ticket #${data.ticket_id} has been created. An admin will follow up shortly.`,
                "bot",
                "ticket"
            );
        }

    } catch (error) {
        removeTyping();
        addMessage("Something went wrong. Please try again.", "bot");
    }

    userInput.disabled = false;
    sendBtn.disabled = false;
    userInput.focus();
}

sendBtn.addEventListener("click", sendMessage);

userInput.addEventListener("keypress", function(e) {
    if (e.key === "Enter" && !sendBtn.disabled) sendMessage();
});
</script>
</body>
</html>
